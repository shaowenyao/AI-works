<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Job Application Assistant</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 800px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
      }
      h1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 1.4rem;
      }
      button {
        cursor: pointer;
        border: 1px solid #ccc;
        background: #fff;
        border-radius: 6px;
        padding: 0.4rem 0.8rem;
        font-size: 0.85rem;
      }
      button:hover {
        background: #f2f2f2;
      }
      button:disabled {
        opacity: 0.5;
        cursor: default;
      }
      .card {
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .priority-card {
        border-color: #e0b400;
        background: #fffbea;
      }
      .priority {
        display: inline-block;
        font-size: 0.75rem;
        padding: 0.1rem 0.5rem;
        border-radius: 999px;
        background: #f5d800;
        color: #443800;
        margin-left: 0.5rem;
      }
      .card h3 {
        margin: 0 0 0.25rem;
        font-size: 1.05rem;
      }
      .meta {
        color: #666;
        font-size: 0.85rem;
        margin-bottom: 0.5rem;
      }
      .status {
        display: inline-block;
        font-size: 0.75rem;
        padding: 0.1rem 0.5rem;
        border-radius: 999px;
        background: #eee;
        margin-left: 0.5rem;
      }
      .actions {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .actions a {
        font-size: 0.85rem;
      }
      .legit-check {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.85rem;
        color: #444;
      }
      .hint {
        font-size: 0.85rem;
        color: #866;
        font-style: italic;
      }
      #empty {
        color: #666;
      }
    </style>
  </head>
  <body>
    <h1>
      Job Application Assistant
      <span>
        <button id="scan-btn">Scan for new jobs</button>
      </span>
    </h1>
    <p id="empty" hidden>
      No jobs yet. Add companies to <code>src/jobs/sources/config.ts</code>, then click "Scan for new jobs".
    </p>
    <div id="jobs"></div>
    <script src="app.js"></script>
  </body>
</html>
