<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Job Application Assistant</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        max-width: 880px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
        background: #f5f6f7;
      }
      h1 {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 1.5rem;
      }
      .header-actions {
        display: flex;
        gap: 0.5rem;
      }
      button {
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border: 1px solid #d8dbdf;
        background: #fff;
        border-radius: 8px;
        padding: 0.45rem 0.9rem;
        font-size: 0.85rem;
        color: #1a1a1a;
      }
      button:hover:not(:disabled) {
        background: #f2f2f2;
      }
      button:disabled {
        opacity: 0.55;
        cursor: default;
        color: #b0b3b8;
      }
      .btn-dark {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }
      .btn-dark:hover:not(:disabled) {
        background: #333;
      }
      .btn-danger {
        color: #b3261e;
        border-color: #f3c9c9;
      }
      .btn-danger:hover:not(:disabled) {
        background: #fdf1f0;
      }
      #scan-btn {
        border-radius: 999px;
        padding: 0.5rem 1.1rem;
      }
      .card {
        background: #fff;
        border: 1px solid #eceef0;
        border-radius: 12px;
        padding: 1.1rem 1.25rem;
        margin-bottom: 1rem;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }
      .priority-card {
        background: #eaf2fb;
        border-color: #cddef2;
      }
      .card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
      }
      .card-title {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
      }
      .card-title .company {
        font-weight: 400;
        color: #6b7280;
      }
      .title-link {
        color: inherit;
        text-decoration: none;
      }
      .title-link:hover {
        text-decoration: underline;
      }
      .card-badges {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        flex-shrink: 0;
      }
      .priority {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: #dbeafe;
        color: #1e40af;
      }
      .status {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: #eceff1;
        color: #444;
      }
      .date-badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: #eef2f7;
        color: #4b5563;
      }
      .apply-order-badge {
        display: inline-block;
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.15rem 0.6rem;
        border-radius: 999px;
        background: #fef3c7;
        color: #92400e;
      }
      .meta {
        margin: 0.4rem 0 0.9rem;
      }
      .actions {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .actions .links {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-left: auto;
      }
      .actions a {
        font-size: 0.85rem;
        color: #2563eb;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }
      .actions a:hover {
        text-decoration: underline;
      }
      .legit-check {
        display: flex;
        align-items: center;
        gap: 0.3rem;
        font-size: 0.85rem;
        color: #444;
        flex-shrink: 0;
      }
      #empty {
        color: #666;
      }
      .filter-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 1rem 0;
      }
      #location-filter {
        cursor: pointer;
        border: 1px solid #d8dbdf;
        background: #fff;
        border-radius: 8px;
        padding: 0.45rem 2rem 0.45rem 0.9rem;
        font-size: 0.85rem;
        color: #1a1a1a;
        appearance: none;
        background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23555" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>');
        background-repeat: no-repeat;
        background-position: right 0.7rem center;
      }
      #search-input {
        border: 1px solid #d8dbdf;
        background: #fff;
        border-radius: 8px;
        padding: 0.45rem 0.9rem;
        font-size: 0.85rem;
        color: #1a1a1a;
        width: 200px;
      }
      #search-input::placeholder {
        color: #b0b3b8;
      }
      #search-input:focus {
        outline: none;
        border-color: #9aa0a8;
      }
      .filter-note {
        color: #8a8f98;
        font-size: 0.85rem;
      }
      .filter-left {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .senior-check {
        display: flex;
        align-items: center;
        gap: 0.35rem;
        font-size: 0.85rem;
        color: #444;
        cursor: pointer;
      }
      .senior-check.disabled {
        color: #b0b3b8;
        cursor: not-allowed;
      }
      .page-footer {
        margin-top: 2rem;
        padding-top: 1rem;
        border-top: 1px solid #e0e2e5;
        display: flex;
        justify-content: flex-end;
      }
      .demo-mode-check {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.85rem;
        color: #444;
        cursor: pointer;
      }
      .tabs {
        display: flex;
        gap: 1.5rem;
        border-bottom: 1px solid #e0e2e5;
        margin-top: 1.25rem;
      }
      .tab-btn {
        border: none;
        background: none;
        border-radius: 0;
        padding: 0.6rem 0.1rem;
        font-size: 0.9rem;
        font-weight: 600;
        color: #8a8f98;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tab-btn:hover:not(:disabled) {
        background: none;
        color: #1a1a1a;
      }
      .tab-btn.active {
        color: #1a1a1a;
        border-bottom-color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <h1>
      Job Application Assistant
      <span class="header-actions">
        <button id="dummy-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add job
        </button>
        <button id="undo-btn" title="Undo the last delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Undo delete
        </button>
        <button id="scan-btn" class="btn-dark">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          Scan for new jobs
        </button>
      </span>
    </h1>
    <div class="tabs">
      <button class="tab-btn active" data-tab="current">Current</button>
      <button class="tab-btn" data-tab="applied">Applied</button>
      <button class="tab-btn" data-tab="archived">Archived</button>
    </div>
    <div class="filter-row">
      <span class="filter-left">
        <select id="location-filter">
          <option value="remote">Remote</option>
          <option value="local">Local</option>
        </select>
        <input type="text" id="search-input" placeholder="search" />
        <label class="senior-check disabled" title="Not looking for senior positions right now"><input type="checkbox" id="senior-filter" disabled /> Senior positions</label>
      </span>
      <span class="filter-note" id="filter-note">Last 24 hours</span>
    </div>
    <p id="empty" hidden>
      No jobs yet. Ask Claude to add the companies you want to track, then click "Scan for new jobs".
    </p>
    <div id="jobs"></div>
    <div class="page-footer">
      <label class="demo-mode-check" title="Lets 'Apply with AI fill' be used right after 'Optimize CV', without waiting for real documents to be generated — for UX testing/demos">
        <input type="checkbox" id="demo-mode-toggle" /> Demo mode
      </label>
    </div>
    <script src="app.js"></script>
  </body>
</html>
